<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Dandyland</title>
    <style>
      html,body{margin:0;height:100%}
      body{
        background:#171310;color:#f4ead4;
        font-family:Georgia,"Times New Roman",serif;
        display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;
      }
      h1{font-size:clamp(2.5rem,10vw,5rem);margin:0 0 .5rem;color:#f4ead4}
      p{color:rgba(244,234,212,.7);max-width:32ch;margin:0 auto;line-height:1.6}
      .k{letter-spacing:.28em;text-transform:uppercase;font-size:.7rem;color:#e0a72e;opacity:.8}
      a{display:inline-block;margin-top:1.5rem;color:#e0a72e;text-decoration:none;border:1px solid #e0a72e;border-radius:999px;padding:.6rem 1.4rem}
    </style>
  </head>
  <body>
    <div>
      <p class="k">You've wandered off the road</p>
      <h1>Dandyland</h1>
      <p>You appear to be offline. The garden is still here — come back when the signal returns.</p>
      <a href="/studio">Try again</a>
    </div>
  </body>
</html>
